<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Task Scheduler Plus</title>
  <desc id="desc">Blue scheduler icon showing a clock separated from a workflow line.</desc>
  <defs>
    <linearGradient id="background" x1="9" y1="6" x2="55" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.45" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="clockFace" x1="16" y1="9" x2="38" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="nodeFill" x1="15" y1="42" x2="51" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="15.5" fill="url(#background)"/>

  <g filter="url(#softShadow)">
    <circle cx="26" cy="22" r="13.5" fill="url(#clockFace)" opacity="0.96"/>
    <circle cx="26" cy="22" r="13.5" fill="none" stroke="#ffffff" stroke-width="2.6"/>
    <path d="M26 14.5V22l6 3.8" fill="none" stroke="#2563eb" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="26" cy="22" r="2" fill="#2563eb"/>
  </g>

  <path d="M15 49h14l6-7h16" fill="none" stroke="#bfdbfe" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="15" cy="49" r="4.4" fill="url(#nodeFill)" stroke="#ffffff" stroke-width="2"/>
  <circle cx="35" cy="42" r="4.4" fill="url(#nodeFill)" stroke="#ffffff" stroke-width="2"/>
  <circle cx="51" cy="42" r="4.4" fill="url(#nodeFill)" stroke="#ffffff" stroke-width="2"/>
</svg>
